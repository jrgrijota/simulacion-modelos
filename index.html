<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulación Atómica: Dispersión de Thomson</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #12141c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100vw;
      overflow: hidden;
      padding: 16px;
    }

    .simulation-container {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      width: 100%;
      max-width: 1280px;
      height: 720px;
      background-color: #1a1d29;
      border: 1px solid #2d324a;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }

    .canvas-area {
      position: relative;
      width: 100%;
      height: 100%;
      background-color: #0b0c10;
      border-radius: 8px;
      border: 1px solid #25293d;
      overflow: hidden;
    }

    #canvas-holder {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100%;
      overflow-y: auto;
      padding-right: 4px;
    }

    .control-panel::-webkit-scrollbar {
      width: 6px;
    }
    .control-panel::-webkit-scrollbar-thumb {
      background: #2d324a;
      border-radius: 3px;
    }

    .control-card {
      background-color: #222638;
      border: 1px solid #2d324a;
      border-radius: 8px;
      padding: 12px;
    }

    .control-card h2 {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 10px;
      border-left: 3px solid #00a0ff;
      padding-left: 6px;
    }

    .control-group {
      margin-bottom: 10px;
    }
    .control-group:last-child {
      margin-bottom: 0;
    }

    label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .data-readout {
      font-family: monospace;
      font-weight: bold;
      color: #00a0ff;
      background-color: #0f111a;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 11px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: #0f111a;
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #00a0ff;
      cursor: pointer;
      border: 2px solid #222638;
    }

    select {
      width: 100%;
      background-color: #0f111a;
      border: 1px solid #3b4261;
      border-radius: 6px;
      color: #f1f5f9;
      padding: 6px 10px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .btn-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: auto;
    }

    button {
      background-color: #2563eb;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      padding: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button:hover { background-color: #3b82f6; }
    button:disabled { background-color: #1e293b; color: #64748b; cursor: not-allowed; }
    button.btn-secondary { background-color: #334155; }
    button.btn-secondary:hover { background-color: #475569; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .legend-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="simulation-container">
    <div class="control-panel">
      <div class="control-card">
        <h2>Configuración de Entorno</h2>
        <div class="control-group">
          <label>Vista de Laboratorio</label>
          <select id="ui-mode-select">
            <option value="atom">Átomo Individual</option>
            <option value="foil">Lámina Macroscópica</option>
          </select>
        </div>
        <div class="control-group">
          <label>Número Atómico (Z) <span class="data-readout" id="z-val">14</span></label>
          <input type="range" id="ui-z-slider" min="1" max="100" value="14">
        </div>
      </div>

      <div class="control-card">
        <h2>Lógica de Disparo</h2>
        <div class="control-group">
          <label>Modo de Emisión</label>
          <select id="ui-trigger-select">
            <option value="click">Disparo Manual (Clic)</option>
            <option value="continuous">Ráfaga Continua</option>
          </select>
        </div>
        <div class="control-group" id="group-rate" style="opacity: 0.3; pointer-events: none;">
          <label>Frecuencia de Flujo <span class="data-readout" id="rate-val">20</span></label>
          <input type="range" id="ui-rate-slider" min="1" max="60" value="20">
        </div>
      </div>

      <div class="control-card">
        <h2>Parámetros del Proyectil (α)</h2>
        <div class="control-group">
          <label>Velocidad Inicial <span class="data-readout" id="speed-val">10.0</span></label>
          <input type="range" id="ui-speed-slider" min="4" max="16" step="0.5" value="10">
        </div>
      </div>

      <div class="control-card">
        <h2>Instrumentación Visual</h2>
        <div class="legend-item">
          <div class="legend-color" style="background: rgba(255, 110, 0, 0.28); border: 1px solid rgba(255,130,0,0.6);"></div>
          <span>Masa positiva continua (Thomson)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #00a0ff;"></div>
          <span>Electrones discretos (1 px)</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: rgba(0, 160, 255, 0.12); border: 1px dashed rgba(0, 160, 255, 0.4); border-radius: 0;"></div>
          <span>Zona reactiva (Clic a cualquier Y)</span>
        </div>
      </div>

      <div class="btn-container">
        <button id="ui-btn-shoot">Lanzar Proyectil</button>
        <button id="ui-btn-reset" class="btn-secondary">Limpiar Trazas</button>
      </div>
    </div>

    <div class="canvas-area">
      <div id="canvas-holder"></div>
    </div>
  </div>

  <script src="js/ThomsonTarget.js"></script>
  <script src="js/AlphaParticle.js"></script>
  <script src="js/sketch.js"></script>
</body>
</html>
